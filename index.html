<!DOCTYPE html>
<html>
<head>
    <title>擲骰子遊戲</title>
    <style>
        #result {
            width: 100px;
            height: 100px;
            line-height: 100px; /* 讓文字在垂直方向置中 */
            border: 2px solid #333;
            border-radius: 10px; /* 圓角效果 */
            font-size: 40px;
            text-align: center; /* 讓文字在水平方向置中 */
            margin: 20px auto; /* 讓骰子跟周圍保持距離並置中 */
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>🎲 擲骰子</h1>
    <div id="result">??</div>
    <button onclick="rollDice()">開始擲骰子</button>

    <script>
        function rollDice() {
            
        // 1. 產生 1 到 6 的隨機數
        let points = Math.floor(Math.random() * 6) + 1;

        // 2. 找到網頁上顯示結果的區塊，並更新文字
        document.getElementById("result").innerText = points;
    }
        
    </script>
</body>
</html>
